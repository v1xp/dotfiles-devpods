set-option -sg escape-time 10
set-option -g focus-events on
set-option -a terminal-features 'xterm-256color:RGB'

# Increase scrollback buffer
set -g history-limit 50000

set -g set-clipboard on         # Use system clipboard
set -g allow-passthrough on     # Allow programs in the pane to bypass tmux (e.g. for image preview)
set -g mouse on
set -g status-position bottom

# Set window titles automatically
set -g set-titles on
set -g set-titles-string '#S:#I #W'

# Vi mode for copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Better splits (open in current path)
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Easy config reload
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

set -g visual-bell off

set -g base-index 1
setw -g pane-base-index 1

set -g status-style bg=default,fg=white
set -g status-left-length 40
set -g status-left "#[fg=cyan] ⬢ #[fg=green,bold]#S "
set -g status-right "#[align=right,fg=green,bold] #[fg=cyan,bold]%d %b #[fg=green,bold]󰥔 #[fg=cyan,bold]%R"

set -g pane-border-style fg=magenta
set -g pane-active-border-style fg=green,bold

set -g message-style fg=black,bg=green,bold

setw -g window-status-current-format '#[fg=yellow,bold]● #[fg=green,bold]#(echo '#W' | tr '[:lower:]' '[:upper:]')'
setw -g window-status-format '#{?window_bell_flag, 🔔,}#I #W'


set -g mode-style bg=colour236,fg=green,bold


# Formatted keybindings popup (prefix + ?)
bind ? display-popup -E -w 90% -h 90% \
  "tmux list-keys -T prefix -N | awk '{printf \"\\033[32mC-b \\033[33m%-15s \\033[37m%s\\033[0m\\n\", \$1, substr(\$0, index(\$0,\$2))}' | less -R"

# =============================================================================
# Custom session: nvim | terminal | opencode
# =============================================================================
bind S rename-window nvim \; \
  send-keys nvim\ . C-m \; \
  new-window -c "#{pane_current_path}" -n terminal \; \
  new-window -c "#{pane_current_path}" -n opencode \; \
  send-keys opencode C-m \; \
  select-window -t :.1 \; \
  run-shell -b 'branch=$(git branch --show-current 2>/dev/null); name="${branch:-$(basename "$PWD")}"; tmux rename-session "$name"'

# =============================================================================
# TPM (Tmux Plugin Manager)
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect: save/restore tmux sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'

# Continuum: auto-save every 15 minutes, auto-restore on server start
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Initialize TPM (MUST be at the bottom of the file)
run '~/.tmux/plugins/tpm/tpm'

# =============================================================================
# vim-tmux-navigator: smart C-h/j/k/l between tmux panes and nvim windows
# =============================================================================

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

